<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EZOO POS - Logs</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
      background: #1e1e1e;
      color: #d4d4d4;
      min-height: 100vh;
    }
    .header {
      background: #2d2d2d;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #3d3d3d;
    }
    h1 { font-size: 18px; font-weight: 600; }
    .refresh-btn {
      background: #0e639c;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
    }
    .refresh-btn:hover { background: #1177bb; }
    .logs-container {
      padding: 16px;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .log-entry { padding: 4px 0; border-bottom: 1px solid #2d2d2d; }
    .log-entry.error { color: #f14c4c; }
    .log-entry.warn { color: #cca700; }
    .log-entry.info { color: #3794ff; }
    .timestamp { color: #6a9955; margin-right: 8px; }
    .close-btn {
      position: fixed;
      top: 16px;
      right: 24px;
      background: #333;
      color: #d4d4d4;
      border: 1px solid #3d3d3d;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>EZOO POS Logs</h1>
    <button class="refresh-btn" onclick="loadLogs()">Refresh</button>
  </div>
  <button class="close-btn" onclick="window.close()">Close</button>
  <div class="logs-container" id="logs">
    Loading...
  </div>
  <script>
    async function loadLogs() {
      const container = document.getElementById('logs');
      if (window.api) {
        try {
          const logs = await window.api.getLogs();
          if (!logs || logs === 'No logs yet') {
            container.textContent = 'No logs available';
            return;
          }
          const entries = logs.split('\n').filter(l => l.trim());
          container.innerHTML = entries.map(entry => {
            const isError = entry.includes('error') || entry.includes('Error') || entry.includes('ERROR');
            const isWarn = entry.includes('warn') || entry.includes('Warn');
            const isInfo = entry.includes('info') || entry.includes('Info');
            let className = 'log-entry';
            if (isError) className += ' error';
            else if (isWarn) className += ' warn';
            else if (isInfo) className += ' info';
            return `<div class="${className}">${escapeHtml(entry)}</div>`;
          }).join('');
        } catch (err) {
          container.textContent = `Error loading logs: ${err.message}`;
        }
      } else {
        container.textContent = 'Log viewer API not available';
      }
    }
    function escapeHtml(text) {
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    loadLogs();
    setInterval(loadLogs, 5000);
  </script>
</body>
</html>
